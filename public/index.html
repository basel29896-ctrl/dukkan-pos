<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <meta name="theme-color" content="#F6F7F9"/>
    <title>Dukkan POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Theme class is applied pre-paint so a dark session never flashes light.
         HeroUI/Tailwind dark mode keys off the `dark` class on <html>. -->
    <script>try{if(localStorage.getItem('dukkan_theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
    <style>
      body{background:#FAFAFA;}
      html.dark body{background:#09090B;}
    </style>
      <link rel="manifest" href="%PUBLIC_URL%/manifest.json"/>
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192.png"/>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-512.png"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-title" content="Dukkan"/>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
